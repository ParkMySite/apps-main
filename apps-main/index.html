<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kerala Treasury - App Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            padding: 30px 20px 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.5s ease;
        }

        .header h1 {
            font-size: 2rem;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: #64748b;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 140px));
            gap: 32px 24px;
            justify-content: center;
            animation: fadeIn 0.6s ease;
        }

        .app-link {
            text-decoration: none;
            display: block;
            text-align: center;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        .app-link:hover {
            transform: translateY(-6px);
        }

        .app-icon-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 120px;
            margin: 0 auto 12px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .app-link:hover .app-icon-wrapper {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            transform: scale(1.02);
        }

        .app-icon {
            width: 55%;
            height: 55%;
            object-fit: contain;
        }

        .default-icon {
            width: 55%;
            height: 55%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(59,130,246,0.2);
        }

        .app-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            line-height: 1.3;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            margin-top: 56px;
            padding-top: 24px;
            color: #94a3b8;
            font-size: 0.75rem;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .apps-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 100px));
                gap: 24px 16px;
            }
            .default-icon {
                font-size: 26px;
            }
            .app-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 App Portal</h1>
            <p>Kerala Treasury</p>
        </div>
        
        <div id="apps-container">
            <!-- Apps will be loaded here -->
        </div>
        
        <div class="footer">
            <p>© 2026 Kerala Treasury</p>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURE YOUR APPLICATIONS HERE
        // Add or remove apps by editing this array
        // ============================================
        
        const applications = [
            // Format: { name: "Display Name", folder: "FolderName", logoUrl: "optional_logo_url" }
            
            { name: "App 01", folder: "App01", logoUrl: "" },
            { name: "App 02", folder: "App02", logoUrl: "" },
            { name: "Financial Dashboard", folder: "FinancialDashboard", logoUrl: "" },
            { name: "Employee Portal", folder: "EmployeePortal", logoUrl: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png" },
            { name: "Document Manager", folder: "DocumentManager", logoUrl: "" },
            { name: "Treasury Reports", folder: "TreasuryReports", logoUrl: "" },
            
            // Add more apps here following the same format
            // { name: "My New App", folder: "MyNewApp", logoUrl: "" },
        ];
        
        // ============================================
        // DO NOT EDIT BELOW THIS LINE
        // ============================================
        
        function renderApps() {
            const container = document.getElementById('apps-container');
            
            if (applications.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 28px;">
                        <p>📂 No applications configured</p>
                        <p style="font-size: 0.85rem; color: #64748b; margin-top: 10px;">Edit the applications array in the script section</p>
                    </div>
                `;
                return;
            }
            
            const cardsHtml = `
                <div class="apps-grid">
                    ${applications.map(app => `
                        <a href="./${app.folder}/" target="_blank" class="app-link" rel="noopener noreferrer">
                            <div class="app-icon-wrapper">
                                ${app.logoUrl && app.logoUrl.trim() ? 
                                    `<img src="${app.logoUrl}" alt="${app.name}" class="app-icon" 
                                        onerror="this.style.display='none'; this.parentElement.querySelector('.default-icon').style.display='flex';">` : 
                                    ''
                                }
                                <div class="default-icon" ${app.logoUrl && app.logoUrl.trim() ? 'style="display: none;"' : ''}>
                                    ${app.name.charAt(0).toUpperCase()}
                                </div>
                            </div>
                            <div class="app-name">${escapeHtml(app.name)}</div>
                        </a>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = cardsHtml;
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Load applications
        renderApps();
    </script>
</body>
</html>
